name: Generate propers JSON

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push generated JSON back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Rebuild all generated data
        working-directory: missale/scripts
        run: python refresh.py

      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add missale/data/propers/ missale/data/tempora.csv missale/data/sancti.csv missale/data/commune.csv missale/data/ordinary.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: regenerate propers JSON [skip ci]"
          git push
